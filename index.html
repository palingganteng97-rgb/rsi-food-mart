<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSI Food &amp; Mark - Loading</title>
  <style>
    :root{--bg:#020617;--emerald:#059669;--muted:rgba(255,255,255,.6)}
    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0;background:var(--bg);color:#fff;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{text-align:center;width:100%;max-width:520px}
    .iconBox{width:96px;height:96px;border-radius:24px;background:rgba(5,150,105,.92);box-shadow:0 25px 50px -12px rgba(4,120,87,.5);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
    .iconPlus{font-size:56px;line-height:1;font-weight:800}
    h1{margin:0;font-size:26px;font-weight:800;letter-spacing:.5px}
    .sub{margin-top:8px;color:var(--muted);font-size:13px}
    .spinnerWrap{margin-top:28px;display:flex;justify-content:center}
    .spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.14);border-top-color:var(--emerald);border-radius:50%;animation:spin .9s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .label{margin-top:16px;color:var(--muted);text-transform:uppercase;font-size:12px;letter-spacing:.08em}
    .progress{margin-top:14px;height:8px;background:rgba(255,255,255,.06);border-radius:999px;overflow:hidden}
    .bar{height:100%;width:0;background:var(--emerald);animation:fill 3s linear forwards}
    @keyframes fill{from{width:0%}to{width:100%}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="iconBox" aria-hidden="true"><div class="iconPlus">+</div></div>
      <h1>RSI FOOD &amp; MARK</h1>
      <div class="sub">Aplikasi Pemesanan Makanan Rumah Sakit</div>

      <div class="spinnerWrap" aria-live="polite" aria-busy="true">
        <div class="spinner"></div>
      </div>

      <div class="label">Menyiapkan Layanan...</div>
      <div class="progress" aria-hidden="true"><div class="bar"></div></div>
    </div>
  </div>

  <script>
    setTimeout(function(){
      window.location.href = 'home.html';
    }, 3000);
  </script>
</body>
</html>
