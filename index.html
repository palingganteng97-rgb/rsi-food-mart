<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSI Food & Mark - Loading</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://jsdelivr.net"></script>
    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader { border-top-color: #34D399; animation: spin 1s linear infinite; }
    </style>
</head>
<body class="bg-gray-900 flex flex-col items-center justify-center min-h-screen text-white select-none">

    <div class="text-center p-6">
        <!-- Logo / Icon Rumah Sakit -->
        <div class="mx-auto bg-emerald-600 p-5 rounded-full w-24 h-24 flex items-center justify-center shadow-lg shadow-emerald-900/50 mb-6 animate-pulse">
            <svg xmlns="http://w3.org" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-12 h-12 text-white">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
        </div>
        
        <!-- Judul Aplikasi -->
        <h1 class="text-3xl font-extrabold tracking-wide mb-2">RSI FOOD & MARK</h1>
        <p class="text-gray-400 text-sm font-medium">Aplikasi Pemesanan Makanan Internal Rumah Sakit</p>
        
        <!-- Spinner Loading -->
        <div class="mt-12 flex justify-center">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-700 h-10 w-10"></div>
        </div>
        <p class="text-xs text-gray-500 mt-4 tracking-widest uppercase">Menyiapkan Layanan...</p>
    </div>

    <script>
        // Simulasi inisialisasi menu bawaan jika LocalStorage masih kosong
        if (!localStorage.getItem('menuMakanan')) {
            const menuAwal = [
                { id: 1, nama: "Bubur Ayam Nutrisi", harga: 15000, diet: "Diet Rendah Garam", gambar: "https://unsplash.com" },
                { id: 2, nama: "Sup Sayur Bening", harga: 12000, diet: "Diet Serat Tinggi", gambar: "https://unsplash.com" }
            ];
            localStorage.setItem('menuMakanan', JSON.stringify(menuAwal));
        }

        // Otomatis pindah halaman ke home.html setelah 3 detik
        setTimeout(() => {
            window.location.href = 'home.html';
        }, 3000);
    </script>
</body>
</html>
