<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Edit Produk</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f5f5f5; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 90vh; margin: 0; box-sizing: border-box; }
        .container { width: 100%; max-width: 850px; background: white; padding: 26px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .menu-link { display: inline-block; color: #007bff; text-decoration: none; font-weight: bold; margin-bottom: 15px; }
        
        /* Pembungkus pencarian */
        .search-wrapper { position: relative; width: 100%; margin-bottom: 20px; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #888; font-size: 16px; }
        .search-input { width: 100%; height: 42px; padding: 10px 35px 10px 35px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 14px; }
        .clear-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #aaa; font-size: 18px; cursor: pointer; display: none; }
        
        /* Grid produk berjejer ke samping */
        .product-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: flex-start; width: 100%; }
        .product-card { flex: 1 1 240px; max-width: 260px; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .product-info h3 { margin: 0 0 5px 0; font-size: 16px; color: #333; }
        .product-info p { margin: 0 0 5px 0; font-size: 12px; color: #777; }
        .product-info span { font-size: 14px; color: #76c000; font-weight: bold; }
        .btn-edit { background-color: #76c000; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; text-decoration: none; }
        .not-found { display: none; width: 100%; text-align: center; color: #999; padding: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Edit Produk (Mode Demo)</h2>
    
    <a href="#" class="menu-link">➔ Kembali ke Menu</a>
    
    <!-- Kolom Pencarian dengan Ikon Lensa dan Tombol Silang -->
    <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchBar" class="search-input" placeholder="Cari produk..." onkeyup="searchProduct()">
        <button id="clearBtn" class="clear-btn" onclick="clearSearch()">&times;</button>
    </div>

    <!-- Wadah Daftar Kartu Produk -->
    <div class="product-grid">
        <div id="notFound" class="not-found">Produk Tidak Ditemukan</div>

        <!-- Kartu Produk 1 -->
        <div class="product-card">
            <div class="product-info">
                <h3>Ayam geprek</h3>
                <p>Sambel Pisah</p>
                <span>Rp 15.000</span>
            </div>
            <a href="#" class="btn-edit">Edit</a>
        </div>
    </div>
</div>

<script>
function searchProduct() {
    let input = document.getElementById('searchBar').value;
    let cards = document.querySelectorAll('.product-card');
    let clearBtn = document.getElementById('clearBtn');
    let hasMatch = false;

    // Tampilkan tombol silang hanya saat kolom ada isinya
    clearBtn.style.display = input.length > 0 ? 'block' : 'none';

    cards.forEach(card => {
        let name = card.querySelector('h3').innerText.toLowerCase();
        if (name.includes(input.toLowerCase())) {
            card.style.setProperty('display', 'flex', 'important');
            hasMatch = true;
        } else {
            card.style.display = 'none';
        }
    });

    document.getElementById('notFound').style.display = hasMatch ? 'none' : 'block';
}

function clearSearch() {
    document.getElementById('searchBar').value = '';
    searchProduct(); // Reset saringan produk agar muncul semua kembali
}
</script>

</body>
</html>
