<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Admin - Edit Produk</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f5f5f5; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 90vh; margin: 0; box-sizing: border-box; }
        .container { width: 100%; max-width: 850px; background: white; padding: 26px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .menu-link { display: inline-block; color: #007bff; text-decoration: none; font-weight: bold; margin-bottom: 15px; }
        
        /* Pembungkus pencarian */
        .search-wrapper { position: relative; width: 100%; margin-bottom: 20px; }
        .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #888; font-size: 16px; }
        .search-input { width: 100%; height: 42px; padding: 10px 35px 10px 35px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 14px; }
        .clear-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #aaa; font-size: 18px; cursor: pointer; display: none; }
        
        /* Grid produk berjejer ke samping */
        .product-grid { display: flex; flex-wrap: wrap; gap: 15px; justify-content: flex-start; width: 100%; }
        .product-card { flex: 1 1 240px; max-width: 260px; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .product-info h3 { margin: 0 0 5px 0; font-size: 16px; color: #333; }
        .product-info p { margin: 0 0 5px 0; font-size: 12px; color: #777; }
        .product-info span { font-size: 14px; color: #76c000; font-weight: bold; }
        .btn-edit { background-color: #76c000; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; text-decoration: none; }
        .not-found { display: none; width: 100%; text-align: center; color: #999; padding: 20px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Edit Produk (Mode Demo)</h2>
    
    <a href="#" class="menu-link">➔ Kembali ke Menu</a>
    
    <!-- Kolom Pencarian dengan Ikon Lensa dan Tombol Silang -->
    <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchBar" class="search-input" placeholder="Cari produk..." onkeyup="searchProduct()">
        <button id="clearBtn" class="clear-btn" onclick="clearSearch()">&times;</button>
    </div>

    <!-- Wadah Daftar Kartu Produk -->
    <div class="product-grid">
        <div id="notFound" class="not-found">Produk Tidak Ditemukan</div>

        <!-- Kartu Produk 1 -->
        <div class="product-card">
            <div class="product-info">
                <h3>Ayam geprek</h3>
                <p>Sambel Pisah</p>
                <span>Rp 15.000</span>
            </div>
            <a href="#" class="btn-edit">Edit</a>
        </div>
    </div>
</div>

<script>
// Ganti alamat URL lama Anda dengan alamat relatif super aman ini:
const API_URL = 'ambil-produk.php';

  const elSearch = document.getElementById('searchBar');
  const elClearSearch = document.getElementById('clearBtn');
  let query = '', semuaProduk = [];

  // 1. Memuat data produk langsung dari server pusat
  async function loadProduk() {
    try {
      const res = await fetch(API_URL);
      semuaProduk = await res.json();
      render();
    } catch (e) {
      console.error('Gagal memuat data dari server API:', e);
    }
  }

  // 2. Event Listener untuk menangani ketikan kolom pencarian
  if (elSearch) {
    elSearch.addEventListener('input', (e) => {
      query = (e.target.value || '').toLowerCase().trim();
      render();
    });
  }

  // 3. Fungsi untuk tombol pembatalan (tanda silang ×)
  if (elClearSearch) {
    elClearSearch.addEventListener('click', () => {
      if (elSearch) { elSearch.value = ''; query = ''; render(); }
    });
  }

  // 4. Fungsi menampilkan list kartu produk secara dinamis ke layar
  function render() {
    const listEl = document.querySelector('.product-grid');
    const notFoundEl = document.getElementById('notFound');
    if (elClearSearch) elClearSearch.style.display = query.length > 0 ? 'block' : 'none';

    // Saring data secara aman (hanya mencocokkan teks nama dan deskripsi saja)
    const hasil = query ? semuaProduk.filter(p => 
      (p.nama || '').toLowerCase().includes(query) || 
      (p.deskripsi || '').toLowerCase().includes(query)
    ) : semuaProduk;

    // Bersihkan daftar lama kecuali elemen pesan error "Not Found"
    const existingCards = listEl.querySelectorAll('.product-card');
    existingCards.forEach(card => card.remove());

    if (!hasil.length && query) {
      if (notFoundEl) notFoundEl.style.display = 'block';
      return;
    }
    if (notFoundEl) notFoundEl.style.display = 'none';

    // Cetak kartu produk yang cocok ke dalam grid
    hasil.forEach(p => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <div class="product-info">
          <h3>${p.nama || '-'}</h3>
          <p>${p.deskripsi || '-'}</p>
          <span>Rp ${p.harga || '-'}</span>
        </div>
        <a href="formulir-edit.html?id=${p.id}" class="btn-edit">Edit</a>
      `;
      listEl.appendChild(card);
    });
  }

  // Jalankan pemanggilan data otomatis saat halaman selesai dimuat oleh browser
  document.addEventListener('DOMContentLoaded', loadProduk);
</script>

</body>
</html>
