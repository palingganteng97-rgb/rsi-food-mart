<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Admin - Tambah Produk</title>
  <style>
    body{font-family:'Segoe UI',sans-serif;background-color:#f5f5f5;padding:20px;margin:0;box-sizing:border-box;}
    .container{width:100%;max-width:700px;margin:0 auto;background:#fff;padding:30px;border-radius:15px;box-shadow:0 4px 15px rgba(0,0,0,0.1);box-sizing:border-box;}

    h2 { text-align: center; color: #333; margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
    .form-group input, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
    .btn-submit { width: 100%; background-color: #76c000; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; }
    .btn-submit:hover { background-color: #65a300; }
    .menu-link { display: inline-block; color: #007bff; text-decoration: none; font-weight: bold; margin-bottom: 20px; }
  </style>
</head>
<body>

<div class="container">
  <a href="menu.html" class="menu-link">➔ Kembali ke Menu</a>
  <h2>Tambah Produk Baru</h2>
  
  <!-- Form Pengisian Data Produk -->
  <form id="form-tambah">
    <div class="form-group">
      <label for="nama">Nama Produk</label>
      <input type="text" id="nama" required placeholder="Contoh: Ayam geprek">
    </div>
    <div class="form-group">
      <label for="deskripsi">Deskripsi</label>
      <textarea id="deskripsi" rows="3" placeholder="Contoh: Sambel Pisah"></textarea>
    </div>
    <div class="form-group">
      <label for="harga">Harga (Rp)</label>
      <input type="text" id="harga" required placeholder="Contoh: 15.000">
    </div>
    <div class="form-group">
      <label for="foto">Foto Produk</label>
      <input type="file" id="foto" accept="image/*">
    </div>
    <button type="submit" class="btn-submit">Simpan Produk</button>
  </form>
</div>

<script>
  // Menggunakan URL relatif agar otomatis mengikuti port server XAMPP yang aktif (8080)
  const API_URL = 'ambil-produk.php';

  document.getElementById('form-tambah').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const nama = document.getElementById('nama').value.trim();
    const deskripsi = document.getElementById('deskripsi').value.trim();
    const harga = document.getElementById('harga').value.trim();
    const fotoInput = document.getElementById('foto');
    
    // Jika ada file foto yang diunggah, konversi ke format teks Base64 agar bisa masuk file JSON
    if (fotoInput.files && fotoInput.files[0]) {
      const reader = new FileReader();
      reader.onloadend = async () => {
        await kirimKeServer({ nama, deskripsi, harga, foto: reader.result });
      };
      reader.readAsDataURL(fotoInput.files[0]);
    } else {
      // Jika tidak mengunggah foto, kirim string kosong
      await kirimKeServer({ nama, deskripsi, harga, foto: '' });
    }
  });

  async function kirimKeServer(data) {
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });
      
      if (res.ok) {
        alert('Produk berhasil ditambahkan ke database!');
        document.getElementById('form-tambah').reset();
      } else {
        alert('Gagal menyimpan produk ke server.');
      }
    } catch (e) {
      console.error(e);
      alert('Terjadi kesalahan koneksi ke server.');
    }
  }
</script>

</body>
</html>
