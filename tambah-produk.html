<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Tambah Produk Kuliner</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f5f5f5; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 90vh; margin: 0; box-sizing: border-box; }
        .form-container { width: 100%; max-width: 700px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
        h2 { margin-top: 0; color: #333; text-align: center; font-size: 26px; margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #555; font-size: 14px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 14px; }
        textarea { height: 100px; resize: none; }
        .kotak-upload { display: flex; flex-direction: column; align-items: center; justify-content: center; border: 2px dashed #76c000; border-radius: 12px; height: 160px; background-color: #fafafa; cursor: pointer; transition: all 0.3s ease; overflow: hidden; position: relative; box-sizing: border-box; }
        .kotak-upload:hover { background-color: #f0f9e6; border-color: #5a9200; }
        #konten-instruksi { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; }
        .ikon-plus { font-size: 36px; color: #76c000; font-weight: bold; line-height: 1; margin-bottom: 4px; text-align: center; }
        .teks-upload { font-size: 13px; color: #777; text-align: center; padding: 0 10px; }
        .preview-img { width: 100%; height: 100%; object-fit: cover; display: none; position: absolute; top: 0; left: 0; }
        .btn-submit { background-color: #76c000; color: white; border: none; padding: 14px; width: 100%; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 15px; box-shadow: 0 4px 10px rgba(118,192,0,0.2); transition: background 0.2s ease; }
        .btn-submit:hover { background-color: #65a300; }
        .link-view { display: block; text-align: center; margin-top: 15px; color: #007bff; text-decoration: none; font-size: 14px; }
        @media (max-width: 480px) { body { padding: 10px; } .form-container { padding: 20px; } h2 { font-size: 22px; } }
    </style>

</head>
<body>

    <div class="form-container">
        <h2>Tambah Produk Baru</h2>
        
        <form id="form-produk">
            <div class="form-group">
                <label for="nama">Nama Makanan / Produk</label>
                <input type="text" id="nama" placeholder="Contoh: Ayam Geprek" required>
            </div>
            
            <div class="form-group">
                <label for="deskripsi">Deskripsi Menu</label>
                <textarea id="deskripsi" placeholder="Contoh: Pedas level 1-5 + lalapan" required></textarea>
            </div>
            
            <div class="form-group">
                <label for="harga">Harga (Rupiah)</label>
                <input type="number" id="harga" placeholder="Contoh: 15000" required>
            </div>

            <!-- Elemen Baru: Kotak Upload dan Pratinjau Gambar -->
            <div class="form-group">
                <label>Foto Produk</label>
                <label for="upload-foto" class="kotak-upload" id="area-drop">
                    <div id="konten-instruksi">
                        <div class="ikon-plus">+</div>
                        <div class="teks-upload">Klik untuk unggah gambar</div>
                    </div>
                    <img id="preview" class="preview-img" alt="Pratinjau Foto">
                    <input type="file" id="upload-foto" accept="image/*" style="display: none;" required>
                </label>
            </div>
            
            <button type="submit" class="btn-submit">SIMPAN PRODUK</button>
        </form>

        <a href="index.html" class="link-view" target="_blank">Lihat Tampilan Menu Utama ➔</a>
    </div>

    <script>
        const inputFoto = document.getElementById("upload-foto");
        const imgPreview = document.getElementById("preview");
        const kontenInstruksi = document.getElementById("konten-instruksi");

        // Fungsi logic untuk menampilkan pratinjau gambar saat file dipilih
        inputFoto.addEventListener("change", function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imgPreview.src = e.target.result;
                    imgPreview.style.display = "block";
                    kontenInstruksi.style.display = "none"; // Sembunyikan teks petunjuk +
                }
                reader.readAsDataURL(file);
            }
        });

        document.getElementById("form-produk").addEventListener("submit", function(e) {
            e.preventDefault(); 

            const nama = document.getElementById("nama").value;
            const deskripsi = document.getElementById("deskripsi").value;
            const hargaInput = document.getElementById("harga").value;
            const fotoBase64 = imgPreview.src; // Mengambil data string base64 gambar untuk disimpan

            const hargaFormatted = parseInt(hargaInput).toLocaleString('id-ID');

            let listProduk = JSON.parse(localStorage.getItem("data_produk")) || [];

            listProduk.push({
                nama: nama,
                deskripsi: deskripsi,
                harga: hargaFormatted,
                foto: fotoBase64 // Menyimpan data gambar ke localStorage
            });

            localStorage.setItem("data_produk", JSON.stringify(listProduk));

            // Reset form dan kembalikan tampilan kotak upload seperti semula
            document.getElementById("form-produk").reset();
            imgPreview.style.display = "none";
            imgPreview.src = "";
            kontenInstruksi.style.display = "block";

            alert("Produk '" + nama + "' berhasil ditambahkan! Silakan cek halaman Utama.");
        });
    </script>
</body>
</html>
