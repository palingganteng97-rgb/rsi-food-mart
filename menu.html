<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RSI Food & Mark - Menu</title>
  
  <!-- Pemanggilan file style CSS utama dan style sidebar asli Anda -->
  <link rel="icon" href="data:,">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="sidebar.css">
</head>
<body>

<!-- 🪟 ELEMEN CONTAINER SIDEBAR ASLI (Melayang di atas segalanya) -->
<div id="overlay-samping" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 99998;" onclick="tutupSidebar()"></div>
<div id="sidebar-wrapper" style="display: none; position: fixed; top: 0; left: 0; width: 280px; height: 100vh; background: #fff; z-index: 99999; box-shadow: 4px 0 15px rgba(0,0,0,0.1); box-sizing: border-box;"></div>

<!-- Pembungkus Utama (Wajib Ada agar CSS Desktop Aktif) -->
<div class="app-container">

  <!-- Bagian Kepala Halaman (Header) -->
  <div class="header" style="position: relative; display: flex; align-items: center; justify-content: center; min-height: 60px; background: #fff;">
    <!-- LOGIKA MURNI: Tombol khusus memanggil fungsi bukaSidebar() dari sidebar.js -->
    <button id="btn-hamburger" onclick="bukaSidebar(event)" style="position: absolute; left: 15px; background: none; border: none; font-size: 24px; cursor: pointer; color: #333; top: 50%; transform: translateY(-50%); padding: 5px; line-height: 1;">☰</button>
    <span style="font-weight: bold; font-size: 20px;">RSI FOOD & MARK</span>
  </div>
  
  <!-- Bar Pencarian Makanan -->
  <div class="searchbar" role="search">
    <span class="search-ic">🔍</span>
    <input id="search" class="search-in" type="text" placeholder="Cari makanan..." autocomplete="off">
    <button id="clearSearch" class="search-x" type="button" aria-label="Hapus">×</button>
  </div>

  <div class="banner">Click & Collect now available!</div>

  <!-- Konten Utama Desktop & Mobile -->
  <div id="main-konten">
    <div class="menu-list" id="menu-list-container">
      <div style="text-align:center;padding:30px;color:#999;font-weight:700;width:100%;">Memuat menu...</div>
    </div>
  </div>

</div> <!-- Akhir dari app-container -->

<!-- Pemanggilan skrip independen secara teratur -->
<script src="sidebar.js"></script>
<script src="menu.js"></script>
<script src="bottom-nav.js"></script>

</body>
</html>
