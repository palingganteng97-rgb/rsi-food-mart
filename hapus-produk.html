<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><link rel="icon" href="data:,"><title>Admin - Hapus Produk</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background-color: #f5f5f5; padding: 20px; display: flex; justify-content: center; align-items: flex-start; min-height: 90vh; margin: 0; box-sizing: border-box; }
    .container { width: 100%; max-width: 850px; background: white; padding: 26px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); box-sizing: border-box; }
    h2 { text-align: center; color: #333; margin-bottom: 20px; }
    .actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .btn { padding: 10px 16px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 14px; text-decoration: none; }
    .btn-danger { background-color: #dc3545; color: white; }
    .btn-small { padding: 6px 12px; font-size: 12px; border-radius: 6px; }
    .btn-link { color: #007bff; text-decoration: none; font-weight: bold; }
    .search-wrapper { position: relative; width: 100%; margin-bottom: 20px; display: flex; align-items: center; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #888; font-size: 16px; }
    .search-input { width: 100%; height: 42px; padding: 10px 40px 10px 35px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 14px; }
    .clear-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #aaa; font-size: 18px; cursor: pointer; display: none; }
    .list { display: flex; flex-wrap: wrap; gap: 15px; justify-content: flex-start; width: 100%; }
    .item { flex: 1 1 240px; max-width: 260px; background: #fff; padding: 15px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
    .left { display: flex; align-items: center; gap: 10px; }
    .foto { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; background-color: #eee; }
    .meta p { margin: 0 0 4px 0; }
    .nama { font-weight: bold; font-size: 15px; color: #333; }
    .desc { font-size: 12px; color: #777; }
    .harga { font-size: 13px; color: #76c000; font-weight: bold; }
    .empty { text-align: center; color: #999; padding: 30px; font-weight: bold; width: 100%; }
    .empty span { font-size: 40px; display: block; margin-bottom: 10px; }
  </style>
</head>
<body>
<div class="container">
  <h2>Hapus Produk (Mode Demo)</h2>
  <div class="actions">
    <button class="btn btn-danger" id="btn-hapus-semua" type="button">Hapus Semua</button>
    <a class="btn-link" href="menu.html">➔ Kembali ke Menu</a>
  </div>
  <div class="search-wrapper">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" class="search-input" placeholder="Cari produk...">
    <button id="btnClearSearch" class="clear-btn">&times;</button>
  </div>
  <div class="list" id="list-produk"></div>
  <div id="empty" class="empty" style="display:none;">
    <span id="empty-icon">🗑️</span><div id="empty-title">Belum ada produk tersimpan</div><div id="empty-desc" style="font-size:13px; margin-top:6px; font-weight:normal;">Tambahkan produk lewat halaman Tambah Produk terlebih dahulu.</div>
  </div>
</div>
<script>

// Ganti alamat URL lama Anda dengan alamat relatif super aman ini:
const API_URL = 'ambil-produk.php';

  const elSearch = document.getElementById('search');
  const elClearSearch = document.getElementById('btnClearSearch');
  let query = '', semuaProduk = [];

  async function loadProduk() {
    try { const res = await fetch(API_URL); semuaProduk = await res.json(); render(); } catch(e) { console.error(e); }
  }
  if (elSearch) { elSearch.addEventListener('input', (e) => { query = (e.target.value || '').toLowerCase().trim(); render(); }); }
  if (elClearSearch) { elClearSearch.addEventListener('click', () => { if (elSearch) { elSearch.value = ''; query = ''; render(); } }); }

  function render() {
    const listEl = document.getElementById('list-produk');
    const emptyEl = document.getElementById('empty');
    if (elClearSearch) elClearSearch.style.display = query.length > 0 ? 'block' : 'none';
    const hasil = query ? semuaProduk.filter(p => (p.nama||'').toLowerCase().includes(query) || (p.deskripsi||'').toLowerCase().includes(query)) : semuaProduk;

    if (!semuaProduk.length) {
      listEl.innerHTML = ''; emptyEl.style.display = 'block';
      document.getElementById('empty-icon').innerText = '🗑️'; document.getElementById('empty-title').innerText = 'Belum ada produk tersimpan';
      document.getElementById('empty-desc').style.display = 'block'; return;
    }
    if (!hasil.length && query) {
      listEl.innerHTML = ''; emptyEl.style.display = 'block';
      document.getElementById('empty-icon').innerText = '🔍'; document.getElementById('empty-title').innerText = 'Produk Tidak Ditemukan';
      document.getElementById('empty-desc').style.display = 'none'; return;
    }
    emptyEl.style.display = 'none';
    listEl.innerHTML = hasil.map(p => `
      <div class="item">
        <div class="left">
          <img class="foto" src="${p.foto || ''}" alt="Foto" onerror="this.style.display='none'" />
          <div class="meta">
            <p class="nama">${p.nama || '-'}</p><p class="desc">${p.deskripsi || '-'}</p><div class="harga">Rp ${p.harga || '-'}</div>
          </div>
        </div>
        <div class="right"><button class="btn btn-danger btn-small" type="button" onclick="hapusSatu('${p.id}')">Hapus</button></div>
      </div>
    `).join('');
  }

async function hapusSatu(id) {
  if (!confirm('Hapus produk ini?')) return;
  try {
    // Sesuaikan format pengiriman parameter ID ke file PHP
    const res = await fetch(`${API_URL}?id=${id}`, { method: 'DELETE' });
    if (res.ok) { alert('Produk dihapus.'); loadProduk(); }
  } catch(e) { alert('Gagal menghapus.'); }
}

  document.getElementById('btn-hapus-semua').addEventListener('click', async () => {
    if (!semuaProduk.length || !confirm('Hapus semua produk tersimpan?')) return;
    try {
      for (let p of semuaProduk) { await fetch(`${API_URL}/${p.id}`, { method: 'DELETE' }); }
      alert('Semua produk dihapus.'); loadProduk();
    } catch(e) { alert('Proses gagal.'); }
  });

  window.hapusSatu = hapusSatu;
  document.addEventListener('DOMContentLoaded', loadProduk);
</script>
</body>
</html>
