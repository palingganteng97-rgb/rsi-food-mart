<!DOCTYPE html><html lang="id"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Riwayat Pesanan - RSI FOOD & MARK</title><link rel="icon" href="data:,"><style>body{font-family:'Segoe UI',sans-serif;background:#f8f9fa;margin:0;padding:0;display:flex;justify-content:center}.wrap{width:100%;max-width:900px;margin:0 auto;padding:18px 14px 90px}h2{margin:10px 0 16px;text-align:center}.list{display:flex;flex-direction:column;gap:12px}.card{background:#fff;border:1px solid #eee;border-radius:14px;padding:14px;box-shadow:0 2px 8px rgba(0,0,0,.03)}.row{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}.muted{color:#888;font-size:12px}.total{color:#76c000;font-weight:1000}.items{margin-top:10px;padding-top:10px;border-top:1px dashed #eee}.item{display:flex;justify-content:space-between;font-size:13px;color:#333}.back{display:block;text-align:center;margin:16px 0 0;color:#007bff;text-decoration:none;font-weight:900}</style></head><body><div class="wrap"><h2>Riwayat Pesanan</h2><div id="list" class="list"></div><a class="back" href="menu.html">➔ Kembali ke Menu</a></div><script>async function loadRiwayat(){try{const res=await fetch('simpan-pesanan.php');const j=await res.json();const pes=j.pesanan||[];const el=document.getElementById('list');if(!pes.length){el.innerHTML='<div class="card"><div class="muted" style="text-align:center;padding:12px 0;">Belum ada riwayat pesanan.</div></div>';return;}el.innerHTML=pes.slice().reverse().map(p=>{const daftar=p.daftar_item||[];return `<div class="card"><div class="row"><div><div style="font-weight:1000">Pesanan #${p.id||'-'}</div><div class="muted">${p.waktu_pesan?new Date(p.waktu_pesan).toLocaleString('id-ID'):'-'}</div></div><div class="total">${rupiah(p.total_harga||0)}</div></div><div class="items">${daftar.map(x=>`<div class="item"><span>${x.nama||'-'} × ${x.jumlah||0}</span><span>${rupiah(x.harga||0)}</span></div>`).join('')}</div></div>`}).join('');}catch(e){console.error(e);document.getElementById('list').innerHTML='<div class="card"><div class="muted" style="text-align:center;padding:12px 0;">Gagal memuat riwayat.</div></div>';}}function rupiah(n){try{return Number(n).toLocaleString('id-ID',{style:'currency',currency:'IDR'});}catch(e){return 'Rp 0';}}document.addEventListener('DOMContentLoaded',loadRiwayat);</script></body></html>
